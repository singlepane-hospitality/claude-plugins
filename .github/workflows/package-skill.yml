name: Package .skill artifacts

on:
  push:
    branches: [main]
    paths:
      - "plugins/singlepane/skills/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip each skill folder into a .skill
        run: |
          cd plugins/singlepane/skills
          for dir in */; do
            skill="${dir%/}"
            zip -r "$GITHUB_WORKSPACE/$skill.skill" "$skill" -x "*.DS_Store"
          done

      - name: Publish rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest --title "Latest skill builds" \
              --notes "Rolling builds of the Singlepane .skill files for claude.ai org admins. Auto-updated on every merge to main."
          gh release upload latest *.skill --clobber
